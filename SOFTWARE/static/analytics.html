<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Аналітика | Cloud Calendar</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <button class="sidebar-toggle" onclick="toggleSidebar()" aria-label="Меню">☰</button>
    <div class="sidebar-backdrop" id="sidebarBackdrop" onclick="toggleSidebar()"></div>

<aside class="sidebar" id="sidebar">
        <a href="calendar.html" class="logo">
            <img src="/img/img1.png" alt="Cloud Calendar" class="logo-img-sidebar">
        </a>
        <div class="section-title">Робоча зона</div>
        <a href="calendar.html"  class="nav-item"><i class="fa-regular fa-calendar"></i>Календар (Д/Т/М)</a>
        <a href="events.html"    class="nav-item"><i class="fa-solid fa-list-check"></i>Мої події (Список)</a>
        <a href="analytics.html" class="nav-item active"><i class="fa-solid fa-chart-column"></i> Аналітика часу</a>
        <a href="profile.html"   class="nav-item"><i class="fa-solid fa-user-pen"></i>Профіль (Налаштування)</a>
        <a href="categories-admin.html" class="nav-item"><i class="fa-solid fa-tag"></i>Редактор категорій</a>
        <div class="section-title admin-only">Зона керування</div>
        <a href="users-admin.html" class="nav-item admin-only"><i class="fa-solid fa-users"></i>Керування користувачами</a>
        <a href="#" onclick="logout(); return false;" class="nav-exit"><i class="fa-solid fa-arrow-right-from-bracket"></i>Вийти</a>
    </aside>

    <main class="main-content">
        <header class="header" style="display:flex; justify-content:space-between; align-items:center;">
            <h1><i class="fa-solid fa-chart-column"></i> Аналітика часу</h1>
            <div style="display:flex; gap:20px; align-items:center;">
                <a href="profile.html" id="user-display-name" style="font-weight:600; text-decoration:none; color:inherit;">Завантаження...</a>
                <a href="profile.html"><img src="/img/img2.png" alt="Profile" class="user-avatar"></a>
            </div>
        </header>

        <div class="card" style="margin-bottom:20px; padding:15px;">
            <div id="total-stats" style="font-weight:600; color:var(--primary);">
                Загальна тривалість подій: <span id="total-hours-value">0</span> год
            </div>
        </div>

        <div style="display:flex; gap:30px; align-items:flex-start;">
            <div class="card" style="flex:1; padding:30px; display:flex; justify-content:center; align-items:center; min-height:450px;">
                <canvas id="timeChart"></canvas>
            </div>
            <div id="analyticsLegend" style="flex:1; display:flex; flex-direction:column; gap:15px;"></div>
        </div>
    </main>

    <script src="js/utils.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
